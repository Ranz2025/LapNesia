server {
    listen 80;
    server_name localhost;

    # Development: proxy to frontend dev server
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy API requests to Laravel
    location /api {
        alias /var/www/backend/public;
        try_files $uri $uri/ @backend;
        
        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
        }
    }
    
    location @backend {
        rewrite /api/(.*)$ /api/index.php?/$1 last;
    }

    # Sanctum CSRF endpoint
    location /sanctum/csrf-cookie {
        alias /var/www/backend/public;
        try_files $uri $uri/ @backend_sanctum;
        
        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
        }
    }

    location @backend_sanctum {
        rewrite ^/(.*)$ /index.php?/$1 last;
    }
}
